<!DOCTYPE html>
<html>
<head>
    <title>History Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="History Quiz">
    <link rel="apple-touch-icon" href="HQuiz_icon_512.png">
</head>

<body>
    <div id="container">

        <div id="top">
            <div id="titleDesc">
                <p id="title">History Quiz</p>
                <p id = "desc">Choose a paper to get started</p>
            </div>

            <div id=britainOrUS>
                <button id="britain">Britain</button>
                <button id="us">US</button>
            </div>

            <!-- The Title bit, with selection for US or Britain-->
        </div>

        <div id="centre" style = "display: none;">

        
            <p id="qTopic">SAMPLE TOPIC</p>
    
            <p id="qTitle">SAMPLE QUESTION</p>
            
            <div id="multiSelect">
                <button id="op1" class = "but">SAMPLE OPTION1</button>
                <button id="op2" class = "but">SAMPLE OPTION2</button>
                <button id="op3" class = "but">SAMPLE OPTION3</button>
                <button id="op4" class = "but">SAMPLE OPTION4</button>
            </div>

            <div id="feedback"></div>

            <button id="nextQButton">Next Question</button>

            <!-- main section wi Quiz
            infinite questions, randomly arranged
            by default - mixed. each question tells you which era its from 
            -->
        </div>

        <div id="bottom">
            
            <!-- Selection for specific topics-->
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
